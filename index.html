<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #f0f0f0;
        font-family: Arial, sans-serif;
    }
    p{
        color: green;
        font-size: 18px;
        line-height: 1.5;
    }
    h1{
        text-align:center;
    }
    .red{
        color: red;
    }
    .container{
        display: flex;
        gap:10px;
        justify-content:center;
    }
    .box{
        background-color:#4CAF50;
        color:white;
        padding:20px;
        font-size:24px;
    }
  .hero{
    text-align:center;
    padding:80px 20px;
    background-color:#e8f5e9;
  }
  .hero h1{
    font-size: 36px;
    margin-bottom:15px;
  }
  .hero p{
    font-size:18px;
    color:#666;
  }
   .card-section{
    text-align:center;
    padding:60px 20px;
}
.card-section h2{
    font-size:28px;
    margin-bottom:40px;
}
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
}
.card{
    background-color:white;
    padding:30px;
    border-radius:8px;
    width:250px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.card h3{
    margin-bottom: 10px;
}
   </style>
    </head>
<body>
<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>
<div class="hero">
    <h1>欢迎来到我的网站</h1>
    <p>这是Day 5实战项目,我用HTML和CSS做的页面。</p>    
</div>
<div class="card-section">
    <h2>我们的服务</h2>
    <div class="cards">
        <div class="card">
            <h3>网页设计</h3>
            <p>专业的网页设计服务</p>
        </div>
        <div class="card">
            <h3>前端开发</h3>
            <p>专业的前端开发服务</p>
        </div>
        <div class="card">
            <h3>技术支持</h3>
            <p>7x24小时技术支持</p>
        </div>
    </div>
</div>
</body>
</html>
